services:
  runner:
    build:
      context: ./DockerImage
    restart: unless-stopped
    env_file: .env
    privileged: true
    deploy:
      mode: replicated
      replicas: 2
      resources:
       limits:
        cpus: '2'
        memory: 2G
       reservations:
        cpus: '0.4'
        memory: 256M